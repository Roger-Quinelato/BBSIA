<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Chatbot RAG do Banco Brasileiro de Soluções de IA" />
  <title>ChatBBSIA — Banco Brasileiro de Soluções de IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="rail" id="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">B</span>
        <strong>ChatBBSIA</strong>
      </div>

      <button id="newChatBtn" class="primary-action" type="button">Novo chat</button>

      <nav class="nav-list" aria-label="Navegação principal">
        <button class="nav-item active" type="button" data-tab="chats">
          <span aria-hidden="true">💬</span>
          Chats
        </button>
        <button class="nav-item" type="button" data-tab="biblioteca">
          <span aria-hidden="true">📚</span>
          Biblioteca
          <em id="bibCount" class="nav-badge"></em>
        </button>
      </nav>

      <!-- Painel de áreas (filtro rápido) -->
      <div id="areasPanel">
        <div class="section-title">Filtro por área</div>
        <nav id="agentList" class="agent-list" aria-label="Áreas de conhecimento">
          <button class="agent-item active" type="button" data-area="">Todas as áreas</button>
          <!-- Populado dinamicamente via /filtros -->
        </nav>
      </div>

      <!-- Painel Biblioteca (documentos) -->
      <div id="bibliotecaPanel" class="bib-panel" hidden>
        <div class="section-title">Documentos na base</div>
        <div id="bibList" class="bib-list" aria-label="Biblioteca de documentos">
          <!-- Populado dinamicamente via /biblioteca -->
        </div>
      </div>
    </aside>

    <aside class="chat-index">
      <div class="search-box">
        <input id="chatSearch" type="search" placeholder="Buscar chats" />
        <span aria-hidden="true">⌕</span>
      </div>

      <section class="chat-group" aria-label="Chats recentes">
        <div class="chat-group-header">
          <span>Chats</span>
          <strong id="chatCount">1</strong>
        </div>
        <button id="currentChatCard" class="chat-card active" type="button">
          <strong id="chatTitle">Nova conversa RAG</strong>
          <span id="chatDate">Hoje</span>
        </button>
      </section>
    </aside>

    <main class="workspace">
      <header class="mobile-bar">
        <button class="icon-button" id="toggleSidebar" type="button" title="Mostrar menu">☰</button>
        <strong>ChatBBSIA</strong>
      </header>

      <section id="messages" class="messages" aria-live="polite">
        <div class="welcome" id="welcome">
          <h1 id="welcomeTitle">Olá!</h1>
          <p>Como posso ajudar?</p>
        </div>
      </section>

      <form id="chatForm" class="composer">
        <textarea
          id="question"
          rows="2"
          placeholder="Pergunte algo sobre os documentos de IA"
          required
        ></textarea>

        <div class="composer-footer">
          <div class="composer-actions">
            <button class="tool-button" type="button" id="uploadPdfBtn" title="Adicionar PDFs">+</button>
            <input id="pdfUpload" type="file" accept="application/pdf,.pdf" multiple hidden />
            <button class="tool-button" type="button" id="clearBtn" title="Limpar chat">⌫</button>
          </div>

          <div class="selectors">
            <select id="areaSelect" aria-label="Base de conhecimento">
              <option value="">Todas as áreas</option>
              <!-- Populado dinamicamente -->
            </select>
            <button id="sendBtn" class="send-button" type="submit" title="Enviar">↗</button>
          </div>
        </div>
      </form>
    </main>
  </div>

  <!-- Modal de detalhes do documento -->
  <div id="docModal" class="modal-overlay" hidden>
    <div class="modal-content" role="dialog" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" type="button" title="Fechar">&times;</button>
      <div id="modalBody" class="modal-body">
        <!-- Conteúdo injetado via JS -->
      </div>
    </div>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
